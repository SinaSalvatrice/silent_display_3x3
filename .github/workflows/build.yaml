name: Build QMK Firmware (silent_display_3x3)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "config.h"
      - "keyboard.json"
      - "readme.md"
      - "silent_display_3x3.c"
      - "silent_display_3x3.h"
      - "rules.mk"
      - "keymaps/**"
      - ".github/workflows/build.yaml"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK firmware tree
        run: |
          rm -rf ~/qmk_firmware
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git ~/qmk_firmware
          qmk config user.qmk_home=~/qmk_firmware

      - name: Copy keyboard into QMK tree
        run: |
          mkdir -p ~/qmk_firmware/keyboards/silent_display_3x3
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            "$GITHUB_WORKSPACE/" \
            ~/qmk_firmware/keyboards/silent_display_3x3/

      - name: Install ARM GCC toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Pull submodules
        run: cd $HOME/qmk_firmware && git submodule update --init --recursive

      - name: Compile VIA firmware
        run: |
          cd ~/qmk_firmware
          qmk compile -j 1 -kb silent_display_3x3 -km via

      - name: Compile custom firmware
        run: |
          cd ~/qmk_firmware
          qmk compile -j 1 -kb silent_display_3x3 -km custom

      - name: Collect firmware artifacts
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          VIA_UF2_FILE=$(find "$HOME/qmk_firmware" -type f -name 'silent_display_3x3_via.uf2' | head -n 1)
          CUSTOM_UF2_FILE=$(find "$HOME/qmk_firmware" -type f -name 'silent_display_3x3_custom.uf2' | head -n 1)
          if [ -z "$VIA_UF2_FILE" ]; then
            echo "Expected VIA firmware silent_display_3x3_via.uf2 was not produced."
            exit 1
          fi
          if [ -z "$CUSTOM_UF2_FILE" ]; then
            echo "Expected custom firmware silent_display_3x3_custom.uf2 was not produced."
            exit 1
          fi
          cp "$VIA_UF2_FILE" "$GITHUB_WORKSPACE/artifacts/"
          cp "$CUSTOM_UF2_FILE" "$GITHUB_WORKSPACE/artifacts/"

      - name: Upload VIA firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: silent_display_3x3_via_firmware
          path: artifacts/silent_display_3x3_via.uf2
          if-no-files-found: error

      - name: Upload custom firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: silent_display_3x3_custom_firmware
          path: artifacts/silent_display_3x3_custom.uf2
          if-no-files-found: error

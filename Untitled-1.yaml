name: Build UF2 (silent_display_3x3)

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths:
      - "**"
  pull_request:
    paths:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rsync \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            python3-pip

      - name: Install avr-gcc
        run: sudo apt-get update && sudo apt-get install -y gcc-avr avr-libc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK firmware
        run: |
          git clone --depth 1 --branch master https://github.com/qmk/qmk_firmware.git ~/qmk_firmware
          cd ~/qmk_firmware
          git submodule update --init --recursive --depth 1
          pip install -r requirements.txt
          qmk config user.qmk_home=~/qmk_firmware

      - name: Copy keyboard into QMK tree
        run: |
          mkdir -p ~/qmk_firmware/keyboards/silent_display_3x3
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            "$GITHUB_WORKSPACE/" \
            ~/qmk_firmware/keyboards/silent_display_3x3/

      - name: Compile (custom)
        run: |
          qmk compile -kb silent_display_3x3 -km custom
          ls -la ~/qmk_firmware/.build || true
          find ~/qmk_firmware/.build -maxdepth 1 -type f -name "*.uf2" -print

      - name: Upload build outputs (custom)
        uses: actions/upload-artifact@v4
      with:
        name: silent_display_3x3_custom_build
     path: |
      ~/qmk_firmware/.build/*
    if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download UF2 artifact
        uses: actions/download-artifact@v4
        with:
          name: silent_display_3x3_custom_uf2
          path: dist

      - name: List files
        run: |
          find dist -type f -maxdepth 4 -print

      - name: Create GitHub Release (attach UF2)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.uf2
